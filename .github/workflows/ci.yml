name: CI

on:
  push:
    branches: [main, master, develop, "phase-*"]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-test:
    name: Backend · Install · Lint · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restaurant_rps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d restaurant_rps_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: Backend

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/restaurant_rps_test
      REDIS_URL: redis://localhost:6379/15
      CELERY_BROKER_URL: redis://localhost:6379/14
      CELERY_RESULT_BACKEND: redis://localhost:6379/13
      CELERY_TASK_ALWAYS_EAGER: "true"
      SECRET_KEY: ci-test-secret-key
      ALLOW_CREATE_ALL: "true"
      SEED_ENTERPRISE_DATA: "false"
      SEED_LEGACY_FORECASTS: "false"
      REDIS_ENABLED: "true"
      METRICS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests --select E,F,W --ignore E501 || true

      - name: Compile check
        run: python -m compileall -q app

      - name: Run migrations
        run: python scripts/migrate.py

      - name: Pytest
        run: python -m pytest -q --tb=short

     

  frontend-lint-build:
    name: Frontend · Install · Lint · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_API_TIMEOUT_MS: "120000"
        run: npm run build

  docker-build:
    name: Docker · Build images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: restaurant-erp-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.worker
          push: false
          tags: restaurant-erp-worker:ci

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: false
          tags: restaurant-erp-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api/v1
